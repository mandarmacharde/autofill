<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h2>FormBot</h2>


<div class="card">
    <strong>Excel</strong>
    <div id="excel">Not Selected</div>
    <input id="excelFile" type="file" accept=".xlsx,.csv">
</div>

<div class="card" id="columnSelectCard" style="display: none; background-color: #fff3cd; border-color: #ffeeba;">
    <strong style="color: #856404;">Select PRN Column</strong>
    <p style="font-size: 12px; margin: 8px 0; color: #856404;">We couldn't automatically detect the column. Please select the correct one:</p>
    <select id="columnSelect" style="width: 100%; padding: 5px; margin-bottom: 10px;"></select>
    <button id="confirmColumnBtn" style="width: 100%; background-color: #856404;">Confirm Column</button>
</div>

<div class="card">
    <strong>Mode</strong>
    <label class="mode-option">
        <input id="modeAuto" type="radio" name="mode" value="auto" checked>
        Fill everything automatically
    </label>
    <label class="mode-option">
        <input id="modeSingle" type="radio" name="mode" value="single">
        Select one PRN only
    </label>
    <select id="prnSelect" disabled>
        <option value="">Select PRN</option>
    </select>
</div>

<div class="stats">
    <div class="card">
        <strong>Current PRN</strong>
        <div id="prn">Not Found</div>
    </div>

    <div class="card">
        <strong>Processed</strong>
        <div id="processed">0</div>
    </div>

    <div class="card">
        <strong>Remaining</strong>
        <div id="remaining">0</div>
    </div>
</div>

<div class="card">
    <strong>Current Status</strong>
    <div id="status">Ready</div>
</div>

<progress id="progressBar" value="0" max="100"></progress>

<div class="actions">
    <button id="startBtn" disabled>Start</button>
    <button id="stopBtn" disabled>Stop</button>
</div>

<script src="lib/xlsx.full.min.js"></script>
<script src="popup.js"></script>

</body>
</html>
